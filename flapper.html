<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Future Step - Sky High Flapper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a0a3d;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Game Header UI */
    #ui-layer {
      position: absolute;
      top: 20px;
      display: flex;
      justify-content: space-between;
      width: 90%;
      max-width: 800px;
      color: white;
      z-index: 10;
      pointer-events: none;
    }
    .score-box { font-size: 24px; text-shadow: 0 0 10px #a855f7; }

    /* Interactive Game Canvas Box */
    canvas {
      background: linear-gradient(180deg, #1a0a3d 0%, #2d1266 50%, #6b21a8 100%);
      border: 3px solid #a855f7;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
      display: block;
    }

    /* Controls Overlay */
    #rehab-overlay {
      position: absolute;
      bottom: 30px;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      font-size: 14px;
      letter-spacing: 2px;
    }

    .btn {
      margin-top: 15px;
      background: transparent;
      border: 2px solid white;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      transition: 0.2s;
      pointer-events: auto;
    }
    .btn:hover { background: white; color: #1a0a3d; }
  </style>
</head>
<body>

  <div id="ui-layer">
    <div class="score-box">SCORE: <span id="score-val">0</span></div>
    <div style="font-size: 14px; color: #4ade80;">MODE: DORSI / PLANTARFLEXION</div>
  </div>

  <canvas id="gameCanvas" width="800" height="500"></canvas>

  <div id="rehab-overlay">
    <p>PRESS <b style="color: #f0abfc;">SPACEBAR</b> OR TOES UP TO FLY HIGHER</p>
    <button class="btn" onclick="window.location.href='select.html'">← QUIT TO MENU</button>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreVal = document.getElementById("score-val");

    // Game variables
    let score = 0;
    let gameOver = false;

    // Player Character Object (Robot matching your theme physics)
    const robot = {
      x: 100,
      y: 200,
      width: 40,
      height: 40,
      gravity: 0.25,
      lift: -6,
      velocity: 0,
      render() {
        // Simple cute neon box placeholder for the character frame
        ctx.fillStyle = "#a855f7";
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.strokeStyle = "#e9d5ff";
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.width, this.height);
        
        // Face/Eyes glow
        ctx.fillStyle = "#00f5d4";
        ctx.fillRect(this.x + 22, this.y + 10, 10, 6);
      },
      update() {
        this.velocity += this.gravity;
        this.y += this.velocity;

        // Ground/Ceiling boundary constraints
        if (this.y + this.height > canvas.height) {
          this.y = canvas.height - this.height;
          this.velocity = 0;
        }
        if (this.y < 0) {
          this.y = 0;
          this.velocity = 0;
        }
      },
      flap() {
        this.velocity = this.lift;
      }
    };

    // Obstacles Array (Energy Gates)
    const gates = [];
    const gateWidth = 60;
    const gateGap = 165; // Adjust spacing to make game easier/harder for stroke victims
    let frameCounter = 0;

    function spawnGate() {
      const minHeight = 50;
      const maxHeight = canvas.height - gateGap - minHeight;
      const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
      
      gates.push({
        x: canvas.width,
        topHeight: topHeight,
        bottomY: topHeight + gateGap,
        passed: false
      });
    }

    // Input Listeners: Triggers whenever patient triggers device signal (Mapped to Spacebar or Mouse Click)
    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        if (gameOver) resetGame();
        else robot.flap();
      }
    });
    canvas.addEventListener("click", () => {
      if (gameOver) resetGame();
      else robot.flap();
    });

    function resetGame() {
      robot.y = 200;
      robot.velocity = 0;
      gates.length = 0;
      score = 0;
      scoreVal.innerText = score;
      gameOver = false;
      loop();
    }

    // Core Animation loop running at 60 FPS
    function loop() {
      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "white";
        ctx.font = "30px 'Orbitron'";
        ctx.textAlign = "center";
        ctx.fillText("EXERCISE COMPLETE", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "16px 'Orbitron'";
        ctx.fillText("Click or Press Space to Play Again", canvas.width / 2, canvas.height / 2 + 20);
        return;
      }

      // Clear layout background frames
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Environment Stars Simulation
      ctx.fillStyle = "rgba(255,255,255,0.3)";
      for(let i=0; i<20; i++) {
        let starX = (Math.sin(i + frameCounter*0.01) * 400) + 400;
        ctx.fillRect(starX, (i*27)%canvas.height, 2, 2);
      }

      // Update and draw robot
      robot.update();
      robot.render();

      // Manage Gates
      frameCounter++;
      if (frameCounter % 130 === 0) {
        spawnGate();
      }

      for (let i = gates.length - 1; i >= 0; i--) {
        let g = gates[i];
        g.x -= 2.5; // Speed of obstacles traveling leftward

        // Draw Energy Gates (Top and Bottom walls)
        ctx.fillStyle = "rgba(168, 85, 247, 0.7)";
        ctx.strokeStyle = "#f0abfc";
        ctx.lineWidth = 3;
        
        // Top Gate
        ctx.fillRect(g.x, 0, gateWidth, g.topHeight);
        ctx.strokeRect(g.x, -5, gateWidth, g.topHeight + 5);
        
        // Bottom Gate
        ctx.fillRect(g.x, g.bottomY, gateWidth, canvas.height - g.bottomY);
        ctx.strokeRect(g.x, g.bottomY, gateWidth, canvas.height - g.bottomY + 5);

        // Score Tracking
        if (!g.passed && g.x + gateWidth < robot.x) {
          score++;
          scoreVal.innerText = score;
          g.passed = true;
        }

        // Collision Framework Check
        if (
          robot.x < g.x + gateWidth &&
          robot.x + robot.width > g.x &&
          (robot.y < g.topHeight || robot.y + robot.height > g.bottomY)
        ) {
          gameOver = true;
        }

        // Remove gates out of view
        if (g.x + gateWidth < 0) {
          gates.splice(i, 1);
        }
      }

      requestAnimationFrame(loop);
    }

    // Start Engine
    spawnGate();
    loop();
  </script>
</body>
</html>
