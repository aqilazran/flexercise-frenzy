<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Step — Sky Patrol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #060214;
      font-family: 'Orbitron', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    #hud {
      position: absolute; top: 18px;
      width: 90%; max-width: 820px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20; pointer-events: none;
    }
    .hud-box {
      background: rgba(10, 3, 24, 0.85);
      border: 1px solid rgba(251, 191, 36, 0.4);
      padding: 10px 22px; border-radius: 12px;
      color: #fff; font-size: 14px; letter-spacing: 2px;
      box-shadow: 0 0 15px rgba(251, 191, 36, 0.15);
    }
    .hud-box span { color: #fbbf24; font-weight: 900; }

    #canvas-container {
      position: relative;
      box-shadow: 0 0 50px rgba(251, 191, 36, 0.2);
      border-radius: 16px; overflow: hidden;
      border: 2px solid rgba(251, 191, 36, 0.3);
    }
    canvas { display: block; background: #0b071e; }
  </style>
</head>
<body>

  <div id="hud">
    <div class="hud-box">SCORE: <span id="hud-score">0</span></div>
    <div class="hud-box">HIGH SCORE: <span id="hud-high">0</span></div>
    <div class="hud-box">ANKLE MOVES: <span id="hud-moves">0</span></div>
  </div>

  <div id="canvas-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const W = canvas.width;
    const H = canvas.height;

    let started = false;
    let gameOver = false;
    let score = 0;
    let highScore = localStorage.getItem('skyPatrol_high') || 0;
    let moveCount = 0;

    // Converted configuration: exactly 3 Horizontal Lanes
    const LANES = 3;
    const LANE_Y =; 
    let currentLane = 1; // Middle Track initial setting
    let playerY = LANE_Y[currentLane];
    const playerX = 140;

    let obstacles = [];
    let spawnTimer = 0;
    let scrollSpeed = 6;
    let stars = [];
    let time = 0;

    // Generate static space star layers
    for(let i=0; i<40; i++) {
      stars.push({ x: Math.random()*W, y: Math.random()*H, s: Math.random()*2.5+0.5 });
    }

    function resetGame() {
      score = 0;
      moveCount = 0;
      currentLane = 1;
      playerY = LANE_Y[currentLane];
      obstacles = [];
      spawnTimer = 0;
      scrollSpeed = 6;
      gameOver = false;
      document.getElementById('hud-score').textContent = score;
      document.getElementById('hud-moves').textContent = moveCount;
    }

    function moveUp() {
      if (gameOver || !started) return;
      if (currentLane > 0) {
        currentLane--;
        moveCount++;
        document.getElementById('hud-moves').textContent = moveCount;
      }
    }

    function moveDown() {
      if (gameOver || !started) return;
      if (currentLane < LANES - 1) {
        currentLane++;
        moveCount++;
        document.getElementById('hud-moves').textContent = moveCount;
      }
    }

    // Capture arrow inputs for Dorsi/Plantar control
    document.addEventListener('keydown', e => {
      if(!started) { started = true; return; }
      if(gameOver) return;
      if(e.key==='ArrowUp' || e.key==='w' || e.key==='W') { e.preventDefault(); moveUp(); }
      if(e.key==='ArrowDown' || e.key==='s' || e.key==='S') { e.preventDefault(); moveDown(); }
    });

    canvas.addEventListener('click', e => {
      if(!started) { started = true; return; }
      
      const rect = canvas.getBoundingClientRect();
      const cx = (e.clientX - rect.left) * (W / rect.width);
      const cy = (e.clientY - rect.top) * (H / rect.height);

      if(gameOver) {
        if(cx > W/2-195 && cx < W/2-20 && cy > H/2+140 && cy < H/2+190) resetGame();
        if(cx > W/2+20 && cx < W/2+195 && cy > H/2+140 && cy < H/2+190) window.location.href='select.html';
        return;
      }

      // Vertical layout touch interactions
      if(cy < H / 2) moveUp();
      else moveDown();
    });

    document.getElementById('hud-high').textContent = highScore;

    function update() {
      time++;
      if (!started || gameOver) return;

      // Gradually increase speed
      scrollSpeed += 0.0015;

      // Smooth track rendering alignment
      const targetY = LANE_Y[currentLane];
      playerY += (targetY - playerY) * 0.22;

      // Move stars field back
      stars.forEach(s => {
        s.x -= (scrollSpeed * 0.3 * s.s);
        if(s.x < 0) s.x = W;
      });

      // Handle standard Jet obstacle generation rules inside the 3 lanes
      spawnTimer++;
      let currentSpawnRate = Math.max(35, 75 - Math.floor(scrollSpeed * 2));
      if(spawnTimer > currentSpawnRate) {
        spawnTimer = 0;
        let targetLaneIndex = Math.floor(Math.random() * LANES);
        obstacles.push({
          x: W + 50,
          y: LANE_Y[targetLaneIndex],
          lane: targetLaneIndex,
          size: 24 + Math.random() * 12,
          passed: false
        });
      }

      // Process side obstacles
      for(let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.x -= scrollSpeed;

        // Passed safely score checking
        if(!obs.passed && obs.x < playerX - 10) {
          obs.passed = true;
          score += 10;
          document.getElementById('hud-score').textContent = score;
          if(score > highScore) {
            highScore = score;
            localStorage.setItem('skyPatrol_high', highScore);
            document.getElementById('hud-high').textContent = highScore;
          }
        }

        // Clean out screen items
        if(obs.x < -60) {
          obstacles.splice(i, 1);
          continue;
        }

        // True circle/hitbox overlap calculations
        let dx = obs.x - playerX;
        let dy = obs.y - playerY;
        let distance = Math.sqrt(dx * dx + dy * dy);
        if(distance < (obs.size + 16)) {
          gameOver = true;
        }
      }
    }

    function draw() {
      // Base space rendering
      ctx.fillStyle = '#0a051d';
      ctx.fillRect(0, 0, W, H);

      // Starfield dots
      ctx.fillStyle = '#ffffff';
      stars.forEach(s => {
        ctx.fillRect(s.x, s.y, s.s, s.s);
      });

      // Visual structural rendering for the 3 horizontal sky tracks
      ctx.strokeStyle = 'rgba(251, 191, 36, 0.12)';
      ctx.lineWidth = 4;
      LANE_Y.forEach(y => {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      });

      // Draw Jet Obstacles / Energy Drone Storm units
      obstacles.forEach(obs => {
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#fbbf24';

        ctx.fillStyle = '#b45309';
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.arc(obs.x, obs.y, obs.size, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();

        // Technical details inside hazards
        ctx.fillStyle = 'rgba(251, 191, 36, 0.3)';
        ctx.beginPath();
        ctx.arc(obs.x - obs.size/4, obs.y - obs.size/4, obs.size/3, 0, Math.PI*2);
        ctx.fill();

        ctx.shadowBlur = 0;
      });

      // Synchronized Player Asset: Cyber Bird Design Animation
      ctx.shadowBlur = 18;
      ctx.shadowColor = '#c084fc';

      // Dynamic wing swing rate math calculations
      let flap = Math.sin(time * 0.28) * 16;

      ctx.save();
      ctx.translate(playerX, playerY);

      // Main feathered wing structure (Animated canvas ellipse node block)
      ctx.fillStyle = '#7c3aed';
      ctx.beginPath();
      ctx.ellipse(-4, -4 + (flap*0.3), 10, Math.abs(flap) + 4, Math.PI / 8, 0, Math.PI*2);
      ctx.fill();

      // Tail plumage
      ctx.fillStyle = '#a855f7';
      ctx.beginPath();
      ctx.moveTo(-24, -2);
      ctx.lineTo(-34, -10);
      ctx.lineTo(-34, 8);
      ctx.closePath();
      ctx.fill();

      // Main central body build
      ctx.fillStyle = '#a855f7';
      ctx.beginPath();
      ctx.ellipse(0, 0, 24, 16, 0, 0, Math.PI * 2);
      ctx.fill();

      // Inner glowing chest plate
      ctx.fillStyle = '#e9d5ff';
      ctx.beginPath();
      ctx.ellipse(6, 4, 12, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      // Cyber optic sensor module
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(12, -5, 5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#060214';
      ctx.beginPath();
      ctx.arc(14, -5, 2.5, 0, Math.PI*2);
      ctx.fill();

      // Golden navigation beak vector
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.moveTo(22, -6);
      ctx.lineTo(34, 0);
      ctx.lineTo(20, 5);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
      ctx.shadowBlur = 0;

      // Overlay text panels
      if (!started) {
        ctx.fillStyle = 'rgba(8, 4, 24, 0.88)';
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = '#ffffff';
        ctx.font = '900 24px "Orbitron"';
        ctx.textAlign = 'center';
        ctx.fillText('SKY PATROL: 3-LANE SYNC', W / 2, H / 2 - 40);

        ctx.fillStyle = '#fbbf24';
        ctx.font = '600 15px "Exo 2"';
        ctx.fillText('Train Dorsiflexion / Plantarflexion by shifting paths', W / 2, H / 2);
        ctx.fillText('PRESS ARROW UP / DOWN OR TAP CANVASES TO START', W / 2, H / 2 + 50);
      }

      if (gameOver) {
        ctx.fillStyle = 'rgba(18, 10, 4, 0.92)';
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = '#fbbf24';
        ctx.font = '900 36px "Orbitron"';
        ctx.textAlign = 'center';
        ctx.fillText('TRAINING COMPLETE', W / 2, H / 2 - 50);

        ctx.fillStyle = '#ffffff';
        ctx.font = '600 16px "Exo 2"';
        ctx.fillText(`Final Flight Score: ${score} points`, W / 2, H / 2 + 5);
        ctx.fillText(`Flexion Motions Counted: ${moveCount} iterations`, W / 2, H / 2 + 30);

        // Control buttons structural layout templates
        ctx.fillStyle = '#1c1917';
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(W/2 - 195, H/2 + 140, 175, 50, 25);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#1c1917';
        ctx.strokeStyle = '#ffffff';
        ctx.beginPath();
        ctx.roundRect(W/2 + 20, H/2 + 140, 175, 50, 25);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#fbbf24';
        ctx.font = '900 13px "Orbitron"';
        ctx.fillText('RESTART FLY', W/2 - 107, H/2 + 171);

        ctx.fillStyle = '#ffffff';
        ctx.fillText('EXIT TO HUB', W/2 + 107, H/2 + 171);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
