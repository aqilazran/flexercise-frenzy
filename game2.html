<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Step — Sky Patrol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #0a0318;
      font-family: 'Orbitron', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    #hud {
      position: absolute; top: 18px;
      width: 90%; max-width: 820px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20; pointer-events: none;
    }
    .hud-box {
      background: rgba(10,3,24,0.75);
      border: 1px solid rgba(251,191,36,0.45);
      border-radius: 12px; padding: 8px 18px;
      font-size: 13px; color: #fde68a; letter-spacing: 1.5px;
    }
    .hud-box span { color: #fbbf24; font-size: 18px; font-weight: 700; }
    #mode-tag { font-size: 11px; color: #fbbf24; letter-spacing: 2px; }

    canvas {
      display: block;
      border: 2.5px solid rgba(251,191,36,0.55);
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(251,191,36,0.2), 0 0 80px rgba(168,85,247,0.15);
    }

    #controls-hint {
      position: absolute; bottom: 18px;
      font-family: 'Exo 2', sans-serif; font-size: 12px;
      color: rgba(255,255,255,0.3); letter-spacing: 2px;
      text-transform: uppercase; pointer-events: none;
    }
    #quit-btn {
      position: absolute; top: 18px; left: calc(5%);
      background: rgba(10,3,24,0.75);
      border: 1px solid rgba(251,191,36,0.4);
      border-radius: 50px; padding: 8px 18px;
      font-family: 'Exo 2', sans-serif; font-size: 13px;
      font-weight: 600; color: #fde68a; cursor: pointer;
      letter-spacing: 1px; z-index: 30; transition: background 0.2s;
    }
    #quit-btn:hover { background: rgba(251,191,36,0.2); }
  </style>
</head>
<body>

<button id="quit-btn" onclick="window.location.href='select.html'">← MENU</button>

<div id="hud">
  <div class="hud-box">SCORE &nbsp;<span id="hud-score">0</span></div>
  <div class="hud-box" id="mode-tag">DORSI &amp; PLANTAR FLEXION</div>
  <div class="hud-box">MOVES &nbsp;<span id="hud-moves">0</span></div>
</div>

<canvas id="gameCanvas" width="820" height="500"></canvas>
<div id="controls-hint">↑ Arrow / W = Dorsiflexion (Up) &nbsp;|&nbsp; ↓ Arrow / S = Plantarflexion (Down)</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

/* ═══════════════════
   STATE  ── SLOWED DOWN FOR REHAB PACING ──
═══════════════════ */
let score=0, moveCount=0, upMoves=0, downMoves=0;
let gameOver=false, started=false, frameCount=0;
let speed=1.5, spawnTimer=0, spawnRate=150;       // was 2.8 / 100
const MAX_SPEED = 3.4;                             // was 7.5
const DIFFICULTY_STEP_FRAMES = 750;                // was 450

/* ═══════════════════
   5 LANES
═══════════════════ */
const LANES = 5;
const LANE_H = H / LANES;
const LANE_Y = Array.from({length: LANES}, (_, i) => LANE_H * i + LANE_H / 2);
let currentLane = 2;
let targetY = LANE_Y[2];
let planeY  = LANE_Y[2];

/* ═══════════════════
   STARS
═══════════════════ */
const stars = Array.from({length: 90}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.6 + 0.3,
  speed: Math.random() * 0.8 + 0.2,
  alpha: Math.random() * 0.6 + 0.3
}));

/* ═══════════════════
   DRAW BIRD CHARACTER (function name kept as drawPlane internally)
═══════════════════ */
function drawPlane(x, y) {
  // Function name kept as "drawPlane" so the rest of the game logic
  // (collisions, calls, etc.) doesn't need to change — visuals only.
  ctx.save();
  ctx.translate(x, y);

  // Gentle flap cycle drives both wings
  const flap = Math.sin(frameCount * 0.18);
  const wingAngle = flap * 0.5; // radians

  // Soft trailing glow behind the bird
  const trail = ctx.createLinearGradient(-55, 0, -8, 0);
  trail.addColorStop(0, 'rgba(251,191,36,0)');
  trail.addColorStop(1, 'rgba(251,191,36,0.35)');
  ctx.fillStyle = trail;
  ctx.beginPath();
  ctx.moveTo(-55, -4); ctx.lineTo(-8, -4);
  ctx.lineTo(-8, 4);   ctx.lineTo(-55, 4);
  ctx.fill();

  // ── Back wing (slightly behind body, flaps opposite phase for depth) ──
  ctx.save();
  ctx.translate(-2, 2);
  ctx.rotate(-wingAngle * 0.8);
  ctx.fillStyle = '#9333ea';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(-22, 10, -34, 4);
  ctx.quadraticCurveTo(-20, 16, 2, 14);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // ── Tail feathers ──
  ctx.fillStyle = '#7c3aed';
  ctx.beginPath();
  ctx.moveTo(-16, -2);
  ctx.lineTo(-34, -10);
  ctx.lineTo(-30, 0);
  ctx.lineTo(-34, 10);
  ctx.closePath();
  ctx.fill();

  // ── Round body ──
  ctx.fillStyle = '#a855f7';
  ctx.beginPath();
  ctx.ellipse(2, 0, 22, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly highlight
  ctx.fillStyle = '#e9d5ff';
  ctx.beginPath();
  ctx.ellipse(0, 6, 14, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── Front wing (flaps on top, casts the main motion) ──
  ctx.save();
  ctx.translate(0, -2);
  ctx.rotate(-wingAngle);
  ctx.fillStyle = '#c084fc';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(-20, -14, -36, -6);
  ctx.quadraticCurveTo(-18, 4, 4, 8);
  ctx.closePath();
  ctx.fill();
  // Wing feather lines
  ctx.strokeStyle = 'rgba(124,58,237,0.4)'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(-6,-2); ctx.lineTo(-26,-7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-4,2);  ctx.lineTo(-22,2);  ctx.stroke();
  ctx.restore();

  // ── Head ──
  ctx.fillStyle = '#a855f7';
  ctx.beginPath();
  ctx.arc(20, -6, 12, 0, Math.PI * 2);
  ctx.fill();

  // Head crest feather
  ctx.fillStyle = '#7c3aed';
  ctx.beginPath();
  ctx.moveTo(16, -16); ctx.lineTo(20, -24); ctx.lineTo(24, -15);
  ctx.closePath(); ctx.fill();

  // Eye
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(25, -8, 5.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath(); ctx.arc(27, -8, 2.8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(26, -9.5, 1, 0, Math.PI * 2); ctx.fill();

  // Beak
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  ctx.moveTo(31, -6);
  ctx.lineTo(40, -3);
  ctx.lineTo(31, 0);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#d97706'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(31, -6); ctx.lineTo(40, -3); ctx.lineTo(31, 0); ctx.stroke();

  // Blush cheek
  ctx.fillStyle = '#f9a8d4'; ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.ellipse(18, -2, 3.5, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // Soft glow outline around whole bird for that AnkleSync neon feel
  ctx.shadowColor = '#f0abfc'; ctx.shadowBlur = 12;
  ctx.strokeStyle = 'rgba(240,171,252,0.4)'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.ellipse(2, 0, 22, 16, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.restore();
}

/* ═══════════════════
   DRAW FRIENDLY ROCK CRITTER (replaces jagged asteroid)
═══════════════════ */
function drawAsteroid(obs) {
  const bob = Math.sin(frameCount * 0.07 + obs.bobSeed) * 3;
  ctx.save();
  ctx.translate(obs.x, obs.y + bob);
  ctx.rotate(Math.sin(frameCount * 0.02 + obs.bobSeed) * 0.08);

  const r = obs.r;

  // Soft shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(0, r + 6, r * 0.7, r * 0.18, 0, 0, Math.PI*2); ctx.fill();

  // Rounded blob body (slightly irregular but soft, no jagged edges)
  ctx.fillStyle = obs.color;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  for (let i = 1; i <= 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const wob = 1 + Math.sin(a * 3 + obs.bobSeed) * 0.08;
    ctx.lineTo(Math.cos(a) * r * wob, Math.sin(a) * r * wob);
  }
  ctx.closePath();
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.ellipse(-r*0.3, -r*0.35, r*0.4, r*0.28, -0.4, 0, Math.PI*2);
  ctx.fill();

  // Big friendly eyes
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(-r*0.3, -r*0.05, r*0.26, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.3,  -r*0.05, r*0.26, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath(); ctx.arc(-r*0.26, 0, r*0.13, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.34,  0, r*0.13, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(-r*0.31, -0.05*r, r*0.05, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.29,  -0.05*r, r*0.05, 0, Math.PI*2); ctx.fill();

  // Smile
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.8; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0, r*0.15, r*0.3, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();

  ctx.restore();
}

/* ═══════════════════
   DRAW FRIENDLY DRONE (rounder, cuter)
═══════════════════ */
function drawDrone(obs) {
  const bob = Math.sin(frameCount * 0.07 + obs.bobSeed) * 3;
  ctx.save();
  ctx.translate(obs.x, obs.y + bob);

  ctx.shadowColor = '#f472b6'; ctx.shadowBlur = 12;

  // Rounded body
  ctx.fillStyle = '#4b5563';
  ctx.beginPath(); ctx.roundRect(-18, -11, 36, 22, 11); ctx.fill();

  // Soft highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(-16, -9, 30, 8, 6); ctx.fill();

  // Friendly face dome
  ctx.fillStyle = '#f472b6';
  ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(-3, -2, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -2, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1e1b4b';
  ctx.beginPath(); ctx.arc(-3, -1, 1.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -1, 1.4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0, 2, 4, 0.2*Math.PI, 0.8*Math.PI); ctx.stroke();

  // Soft arms
  ctx.strokeStyle = '#6b7280'; ctx.lineWidth = 3; ctx.lineCap='round';
  [[-22,-12],[22,-12],[-22,12],[22,12]].forEach(([ex,ey]) => {
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ex,ey); ctx.stroke();
  });

  // Gently spinning propellers
  const spin = frameCount * 0.12;
  [[-22,-12],[22,-12],[-22,12],[22,12]].forEach(([px,py]) => {
    ctx.save(); ctx.translate(px,py);
    ctx.fillStyle = 'rgba(209,213,219,0.7)';
    ctx.save(); ctx.rotate(spin);
    ctx.beginPath(); ctx.ellipse(0,0,9,2,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    ctx.save(); ctx.rotate(spin + Math.PI/2);
    ctx.beginPath(); ctx.ellipse(0,0,9,2,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    ctx.restore();
  });

  ctx.shadowBlur = 0;
  ctx.restore();
}

/* ═══════════════════
   OBSTACLES
═══════════════════ */
let obstacles = [];

const ROCK_COLORS = ['#a16207','#92400e','#b45309','#854d0e'];

function spawnObstacles() {
  const numBlocked = Math.random() < 0.3 ? 2 : 1;
  const pool = [0,1,2,3,4];
  const blocked = [];
  while(blocked.length < numBlocked) {
    const i = Math.floor(Math.random()*pool.length);
    blocked.push(pool.splice(i,1)[0]);
  }
  if(pool.length < 2) blocked.pop();

  blocked.forEach(lane => {
    const isAsteroid = Math.random() < 0.55;
    if(isAsteroid) {
      const r = 20 + Math.random()*12;
      obstacles.push({
        type:'asteroid', lane,
        x: W+40, y: LANE_Y[lane],
        r,
        color: ROCK_COLORS[Math.floor(Math.random()*ROCK_COLORS.length)],
        bobSeed: Math.random()*Math.PI*2,
        passed: false
      });
    } else {
      obstacles.push({
        type:'drone', lane,
        x: W+40, y: LANE_Y[lane],
        bobSeed: Math.random()*Math.PI*2,
        passed: false
      });
    }
  });
}

/* ═══════════════════
   BACKGROUND
═══════════════════ */
function drawBackground() {
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, '#050112');
  grad.addColorStop(0.5,'#0d0528');
  grad.addColorStop(1, '#1a0a3d');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  stars.forEach(s => {
    s.x -= s.speed * (speed*0.15);
    if(s.x < 0) { s.x = W; s.y = Math.random()*H; }
    ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });

  ctx.setLineDash([12,20]);
  ctx.strokeStyle = 'rgba(251,191,36,0.1)';
  ctx.lineWidth = 1;
  for(let i=1; i<LANES; i++) {
    const ly = LANE_H * i;
    ctx.beginPath(); ctx.moveTo(0,ly); ctx.lineTo(W,ly); ctx.stroke();
  }
  ctx.setLineDash([]);

  const laneNames = ['LANE 1','LANE 2','LANE 3','LANE 4','LANE 5'];
  ctx.font = "9px 'Exo 2', sans-serif";
  ctx.fillStyle = 'rgba(251,191,36,0.2)';
  ctx.textAlign = 'right';
  laneNames.forEach((name,i) => {
    ctx.fillText(name, W-8, LANE_Y[i]+4);
  });
  ctx.textAlign = 'left';

  ctx.fillStyle = 'rgba(251,191,36,0.04)';
  ctx.fillRect(0, LANE_H * currentLane, W, LANE_H);
}

/* ═══════════════════
   START SCREEN
═══════════════════ */
function drawStartScreen() {
  drawBackground();
  drawPlane(160, H/2);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = "bold 30px 'Orbitron'";
  ctx.shadowColor='#fbbf24'; ctx.shadowBlur=20;
  ctx.fillText('SKY PATROL', W/2, H/2 - 110);
  ctx.shadowBlur=0;

  ctx.font = "13px 'Exo 2', sans-serif";
  ctx.fillStyle = 'rgba(253,230,138,0.75)';
  ctx.fillText('Glide through 5 lanes, greeting friendly rocks and drones along the way', W/2, H/2 - 74);

  ctx.fillStyle = 'rgba(251,191,36,0.1)';
  ctx.strokeStyle = 'rgba(251,191,36,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(W/2-220, H/2-55, 440, 72, 12); ctx.fill(); ctx.stroke();

  ctx.font = "11px 'Exo 2', sans-serif";
  ctx.fillStyle = '#fbbf24';
  ctx.fillText('DORSIFLEXION (Toes Up) = FLY UP   |   PLANTARFLEXION (Toes Down) = FLY DOWN', W/2, H/2-28);
  ctx.fillStyle = 'rgba(253,230,138,0.5)';
  ctx.fillText('(Keyboard: ↑ / W = Up  —  ↓ / S = Down)', W/2, H/2-6);

  const pulse = 0.6 + 0.4*Math.sin(frameCount*0.07);
  ctx.fillStyle = `rgba(251,191,36,${pulse})`;
  ctx.font = "15px 'Orbitron'";
  ctx.fillText('PRESS ANY KEY OR CLICK TO START', W/2, H/2 + 140);
}

/* ═══════════════════
   GAME OVER SCREEN
═══════════════════ */
function drawGameOver() {
  ctx.fillStyle = 'rgba(5,1,18,0.85)'; ctx.fillRect(0,0,W,H);

  ctx.fillStyle = 'rgba(20,8,50,0.97)';
  ctx.strokeStyle = 'rgba(251,191,36,0.65)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(W/2-245,H/2-205,490,415,18); ctx.fill(); ctx.stroke();

  ctx.textAlign='center';
  ctx.font="bold 28px 'Orbitron'";
  ctx.fillStyle='#fbbf24';
  ctx.shadowColor='#fbbf24'; ctx.shadowBlur=18;
  ctx.fillText('SESSION COMPLETE', W/2, H/2-158);
  ctx.shadowBlur=0;

  ctx.strokeStyle='rgba(251,191,36,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2-205,H/2-135); ctx.lineTo(W/2+205,H/2-135); ctx.stroke();

  ctx.font="13px 'Exo 2'"; ctx.fillStyle='rgba(253,230,138,0.55)';
  ctx.fillText('FINAL SCORE', W/2, H/2-108);
  ctx.font="bold 52px 'Orbitron'"; ctx.fillStyle='#fff';
  ctx.shadowColor='#fbbf24'; ctx.shadowBlur=14;
  ctx.fillText(score, W/2, H/2-58);
  ctx.shadowBlur=0;

  ctx.strokeStyle='rgba(251,191,36,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2-205,H/2-30); ctx.lineTo(W/2+205,H/2-30); ctx.stroke();

  ctx.font="12px 'Orbitron'"; ctx.fillStyle='#fbbf24';
  ctx.fillText('ANKLE MOVEMENT REPORT', W/2, H/2-4);

  const stats = [
    {label:'TOTAL MOVES', value:moveCount, color:'#fbbf24'},
    {label:'UP  (Dorsiflexion)', value:upMoves, color:'#22d3ee'},
    {label:'DOWN  (Plantarflexion)', value:downMoves, color:'#f472b6'},
  ];
  stats.forEach((stat,i) => {
    const bx=W/2-200+i*136, by=H/2+18;
    ctx.fillStyle='rgba(255,255,255,0.05)';
    ctx.strokeStyle='rgba(251,191,36,0.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(bx,by,128,80,10); ctx.fill(); ctx.stroke();
    ctx.font="bold 30px 'Orbitron'"; ctx.fillStyle=stat.color;
    ctx.shadowColor=stat.color; ctx.shadowBlur=10;
    ctx.fillText(stat.value, bx+64, by+46);
    ctx.shadowBlur=0;
    ctx.font="9px 'Exo 2'"; ctx.fillStyle='rgba(253,230,138,0.5)';
    ctx.fillText(stat.label, bx+64, by+66);
  });

  const barW=390, barX=W/2-barW/2, barY=H/2+118;
  ctx.font="10px 'Exo 2'"; ctx.fillStyle='rgba(253,230,138,0.5)';
  ctx.fillText('MOVEMENT BALANCE', W/2, barY-7);
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(barX,barY,barW,14,7); ctx.fill();
  const total=upMoves+downMoves||1;
  const upRatio=upMoves/total;
  if(upRatio>0){
    ctx.fillStyle='#22d3ee';
    ctx.beginPath(); ctx.roundRect(barX,barY,barW*upRatio,14,7); ctx.fill();
  }
  if(1-upRatio>0){
    ctx.fillStyle='#f472b6';
    ctx.beginPath(); ctx.roundRect(barX+barW*upRatio,barY,barW*(1-upRatio),14,7); ctx.fill();
  }
  ctx.font="9px 'Exo 2'"; ctx.fillStyle='#22d3ee'; ctx.textAlign='left';
  ctx.fillText(`UP ${Math.round(upRatio*100)}%`, barX, barY+28);
  ctx.fillStyle='#f472b6'; ctx.textAlign='right';
  ctx.fillText(`DOWN ${Math.round((1-upRatio)*100)}%`, barX+barW, barY+28);
  ctx.textAlign='center';

  ctx.fillStyle='rgba(34,211,238,0.18)'; ctx.strokeStyle='#22d3ee'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(W/2-200,H/2+158,178,42,50); ctx.fill(); ctx.stroke();
  ctx.font="13px 'Orbitron'"; ctx.fillStyle='#fff';
  ctx.fillText('▶  PLAY AGAIN', W/2-111, H/2+185);

  ctx.fillStyle='rgba(251,191,36,0.18)'; ctx.strokeStyle='#fbbf24'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(W/2+22,H/2+158,178,42,50); ctx.fill(); ctx.stroke();
  ctx.font="13px 'Orbitron'"; ctx.fillStyle='#fde68a';
  ctx.fillText('← MENU', W/2+111, H/2+185);
}

/* ═══════════════════
   MAIN LOOP
═══════════════════ */
function loop() {
  requestAnimationFrame(loop);
  frameCount++;

  if(!started) { drawStartScreen(); return; }

  if(gameOver) {
    drawBackground();
    obstacles.forEach(o => o.type==='asteroid' ? drawAsteroid(o) : drawDrone(o));
    drawPlane(120, planeY);
    drawGameOver();
    return;
  }

  planeY += (targetY - planeY) * 0.14;

  // Gentle difficulty ramp, capped at MAX_SPEED
  if(frameCount % DIFFICULTY_STEP_FRAMES === 0 && speed < MAX_SPEED) {
    speed    += 0.25;
    spawnRate = Math.max(95, spawnRate - 6);
  }

  spawnTimer++;
  if(spawnTimer >= spawnRate) { spawnObstacles(); spawnTimer=0; }

  for(let i=obstacles.length-1; i>=0; i--) {
    const obs = obstacles[i];
    obs.x -= speed;

    if(!obs.passed && obs.x < 110) {
      obs.passed=true; score++;
      document.getElementById('hud-score').textContent=score;
    }
    if(obs.x < -80) { obstacles.splice(i,1); continue; }

    const hitR = obs.type==='asteroid' ? obs.r*0.7 : 18;
    const dx = 120 - obs.x, dy = planeY - obs.y;
    if(Math.sqrt(dx*dx+dy*dy) < hitR + 16) { gameOver=true; }
  }

  drawBackground();
  obstacles.forEach(o => o.type==='asteroid' ? drawAsteroid(o) : drawDrone(o));
  drawPlane(120, planeY);
}

/* ═══════════════════
   INPUT
═══════════════════ */
function moveUp() {
  if(gameOver||!started) return;
  if(currentLane>0){
    currentLane--; targetY=LANE_Y[currentLane];
    moveCount++; upMoves++;
    document.getElementById('hud-moves').textContent=moveCount;
  }
}
function moveDown() {
  if(gameOver||!started) return;
  if(currentLane<LANES-1){
    currentLane++; targetY=LANE_Y[currentLane];
    moveCount++; downMoves++;
    document.getElementById('hud-moves').textContent=moveCount;
  }
}

document.addEventListener('keydown', e => {
  if(!started){started=true;return;}
  if(gameOver) return;
  if(e.key==='ArrowUp'  ||e.key==='w'||e.key==='W') { e.preventDefault(); moveUp(); }
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') { e.preventDefault(); moveDown(); }
});

canvas.addEventListener('click', e => {
  if(!started){started=true;return;}
  if(gameOver){
    const rect=canvas.getBoundingClientRect();
    const cx=(e.clientX-rect.left)*(W/rect.width);
    const cy=(e.clientY-rect.top)*(H/rect.height);
    if(cx>W/2-200&&cx<W/2-22&&cy>H/2+158&&cy<H/2+200) resetGame();
    if(cx>W/2+22&&cx<W/2+200&&cy>H/2+158&&cy<H/2+200) window.location.href='select.html';
    return;
  }
  const rect=canvas.getBoundingClientRect();
  const cy=(e.clientY-rect.top)*(H/rect.height);
  if(cy < H/2) moveUp(); else moveDown();
});

function resetGame(){
  score=0;moveCount=0;upMoves=0;downMoves=0;
  gameOver=false;started=true;frameCount=0;
  speed=1.5;spawnTimer=0;spawnRate=150;
  currentLane=2;targetY=LANE_Y[2];planeY=LANE_Y[2];
  obstacles=[];
  document.getElementById('hud-score').textContent='0';
  document.getElementById('hud-moves').textContent='0';
}

loop();
</script>
