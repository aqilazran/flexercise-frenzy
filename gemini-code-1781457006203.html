<button id="play-btn">PLAY</button>

<div id="game-selection-screen" class="hidden">
    <h2>SELECT YOUR EXERCISE</h2>
    <div class="menu-container">
        <button class="game-card" id="game-left-right">
            <h3>Side-to-Side Runner</h3>
            <p>Movement: Inversion / Eversion</p>
        </button>
        
        <button class="game-card" id="game-up-down">
            <h3>Sky High Flapper</h3>
            <p>Movement: Dorsi / Plantarflexion</p>
        </button>
        
        <button class="game-card" id="game-swing">
            <h3>Swing & Glide</h3>
            <p>Movement: Continuous Sweep</p>
        </button>
    </div>
    <button id="back-to-home">Back</button>
</div>
