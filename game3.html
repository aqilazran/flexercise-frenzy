<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Step — Neon Rush</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: #050112;
      font-family: 'Orbitron', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #hud {
      position: absolute; top: 18px;
      width: 90%; max-width: 820px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20; pointer-events: none;
    }
    .hud-box {
      background: rgba(5,1,18,0.8);
      border: 1px solid rgba(168,85,247,0.4);
      border-radius: 8px; padding: 8px 16px;
      color: #fff; font-size: 14px; letter-spacing: 1px;
      box-shadow: 0 0 10px rgba(168,85,247,0.2);
    }
    .hud-val { color: #00f5d4; font-weight: 700; margin-left: 4px; }
    canvas {
      background: #09041e;
      border: 2px solid #a855f7;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(168,85,247,0.3);
      display: block;
    }
    #rehab-ctrl {
      position: absolute; bottom: 20px;
      text-align: center; color: rgba(255,255,255,0.6);
      font-family: 'Exo 2', sans-serif; font-size: 13px;
      letter-spacing: 1.5px; line-height: 1.6;
    }
    .accent { color: #f0abfc; font-weight: 600; font-family: 'Orbitron', monospace; }
  </style>
</head>
<body>

  <div id="hud">
    <div class="hud-box">SCORE:<span id="hud-score" class="hud-val">0</span></div>
    <div class="hud-box" style="border-color:rgba(0,245,212,0.4);">TOTAL REPS:<span id="hud-moves" class="hud-val">0</span></div>
  </div>

  <canvas id="rushCanvas" width="800" height="500"></canvas>

  <div id="rehab-ctrl">
    <p>USE <span class="accent">A / D</span> OR <span class="accent">← / → ARROWS</span> (ANKLE INVERSION / EVERSION)</p>
    <p style="font-size:11px; margin-top:4px; color:rgba(255,255,255,0.4);">SPAWN FROM DISTANCE — DODGE INCOMING OBSTACLES</p>
  </div>

  <script>
    const canvas = document.getElementById('rushCanvas');
    const ctx = canvas.getContext('2d');

    const W = canvas.width;
    const H = canvas.height;

    let score = 0;
    let moveCount = 0;
    let leftMoves = 0;
    let rightMoves = 0;
    let gameOver = false;
    let started = false;

    const horizonY = 160; 
    const roadBottomY = H;
    
    let currentLane = 1; 
    let prevLane = 1; 
    let laneT = 1.0; 

    const playerBaseY = H - 65; 
    const playerLanesX =;

    const obstacles = [];
    let spawnTimer = 0;
    let spawnInterval = 90; 
    let gameSpeed = 0.012; 

    function spawnObstacle() {
      const lane = Math.floor(Math.random() * 3); 
      obstacles.push({
        lane: lane,
        progress: 0, 
        passed: false
      });
    }

    function resetGame() {
      score = 0;
      moveCount = 0;
      leftMoves = 0;
      rightMoves = 0;
      currentLane = 1;
      prevLane = 1;
      laneT = 1.0;
      obstacles.length = 0;
      spawnTimer = 0;
      spawnInterval = 90;
      gameSpeed = 0.012;
      gameOver = false;
      started = true;
      document.getElementById('hud-score').textContent = '0';
      document.getElementById('hud-moves').textContent = '0';
    }

    function moveLeft() {
      if(gameOver || !started) return; 
      if(currentLane > 0) {
        prevLane = currentLane; currentLane--; laneT = 0; 
        moveCount++; leftMoves++; 
        document.getElementById('hud-moves').textContent = moveCount; 
      }
    }
    function moveRight() {
      if(gameOver || !started) return; 
      if(currentLane < 2) {
        prevLane = currentLane; currentLane++; laneT = 0; 
        moveCount++; rightMoves++; 
        document.getElementById('hud-moves').textContent = moveCount; 
      }
    }

    document.addEventListener('keydown', e => {
      if(!started) { started = true; return; } 
      if(gameOver) return;
      if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLeft(); 
      if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveRight(); 
    });

    canvas.addEventListener('click', e => {
      if(!started) { started = true; return; } 
      if(gameOver) {
        const rect = canvas.getBoundingClientRect();
        const cx = (e.clientX - rect.left) * (W / rect.width); 
        const cy = (e.clientY - rect.top) * (H / rect.height); 
        if(cx > W/2 - 200 && cx < W/2 - 22 && cy > H/2 + 158 && cy < H/2 + 200) resetGame(); 
        if(cx > W/2 + 22 && cx < W/2 + 200 && cy > H/2 + 158 && cy < H/2 + 200) window.location.href = 'select.html'; 
        return;
      }
      
      const rect = canvas.getBoundingClientRect();
      const clickX = (e.clientX - rect.left) * (W / rect.width);
      if(clickX < W/2) moveLeft();
      else moveRight();
    });

    function updateAndRender(time) {
      ctx.clearRect(0, 0, W, H); 

      let skyGrd = ctx.createLinearGradient(0, 0, 0, horizonY); 
      skyGrd.addColorStop(0, '#050112'); 
      skyGrd.addColorStop(1, '#160833'); 
      ctx.fillStyle = skyGrd; 
      ctx.fillRect(0, 0, W, horizonY); 

      ctx.fillStyle = 'rgba(255,255,255,0.4)'; 
      for(let i=0; i<25; i++) {
        let sx = (Math.sin(i * 4321 + time * 0.0005) * 0.5 + 0.5) * W; 
        let sy = ((i * 7654) % horizonY); 
        ctx.fillRect(sx, sy, 1.5, 1.5); 
      }

      ctx.fillStyle = '#0b0526'; 
      ctx.beginPath();
      ctx.moveTo(W/2 - 40, horizonY);
      ctx.lineTo(W/2 + 40, horizonY);
      ctx.lineTo(W - 40, roadBottomY);
      ctx.lineTo(40, roadBottomY);
      ctx.closePath();
      ctx.fill();

      const horizonLanesX = [W/2 - 25, W/2, W/2 + 25];
      const bottomLanesX =;

      ctx.strokeStyle = '#a855f7'; 
      ctx.lineWidth = 3; 
      ctx.beginPath(); ctx.moveTo(W/2 - 35, horizonY); ctx.lineTo(60, roadBottomY); ctx.stroke(); 
      ctx.beginPath(); ctx.moveTo(W/2 + 35, horizonY); ctx.lineTo(W - 60, roadBottomY); ctx.stroke(); 

      ctx.strokeStyle = 'rgba(168,85,247,0.25)'; 
      ctx.lineWidth = 1; 
      let lineOffset = (time * 0.05) % 40; 
      for(let y = horizonY; y < H; y += 30) {
        let currentY = y + (lineOffset * ((y - horizonY) / (H - horizonY)));
        if(currentY < H) {
          let ratio = (currentY - horizonY) / (H - horizonY); 
          let leftX = (W/2 - 35) + (60 - (W/2 - 35)) * ratio;
          let rightX = (W/2 + 35) + ((W - 60) - (W/2 + 35)) * ratio;
          ctx.beginPath(); ctx.moveTo(leftX, currentY); ctx.lineTo(rightX, currentY); stroke();
        }
      }

      if(!started) {
        // Render the background road, landscape, and ship BEFORE putting up the layout overlay text
        ctx.fillStyle = '#00f5d4'; 
        ctx.strokeStyle = '#fff'; 
        ctx.lineWidth = 2; 
        ctx.beginPath();
        ctx.moveTo(W/2, playerBaseY - 35);
        ctx.lineTo(W/2 - 22, playerBaseY + 10);
        ctx.lineTo(W/2 + 22, playerBaseY + 10);
        ctx.closePath(); ctx.fill(); ctx.stroke();

        ctx.fillStyle = 'rgba(5,1,18,0.75)'; ctx.fillRect(0,0,W,H); 
        ctx.fillStyle = '#fff'; ctx.font = "bold 32px 'Orbitron'"; ctx.textAlign = 'center'; 
        ctx.fillText("NEON RUSH", W/2, H/2 - 20); 
        ctx.fillStyle = '#00f5d4'; ctx.font = "600 16px 'Exo 2'"; 
        ctx.fillText("PRESS ANY ARROW KEY OR CLICK TO START", W/2, H/2 + 25); 
        requestAnimationFrame(updateAndRender); 
        return;
      }

      if(gameOver) {
        ctx.fillStyle = 'rgba(5,1,18,0.9)'; ctx.fillRect(0, 0, W, H); 
        ctx.fillStyle = '#ff3366'; ctx.font = "bold 34px 'Orbitron'"; ctx.textAlign = 'center'; 
        ctx.fillText("EXERCISE COMPLETED", W/2, H/2 - 110); 
        
        ctx.fillStyle = '#fff'; ctx.font = "16px 'Exo 2'"; 
        ctx.fillText(`Final Score: ${score} points`, W/2, H/2 - 65); 
        ctx.fillText(`Total Repetition Count: ${moveCount} movements`, W/2, H/2 - 40); 
        
        ctx.fillStyle = 'rgba(255,255,255,0.05)'; 
        ctx.fillRect(W/2 - 180, H/2 - 20, 360, 130); 
        ctx.strokeStyle = 'rgba(168,85,247,0.4)'; ctx.strokeRect(W/2 - 180, H/2 - 20, 360, 130); 
        
        ctx.fillStyle = '#00f5d4'; ctx.font = "bold 13px 'Orbitron'"; ctx.textAlign = 'left'; 
        ctx.fillText("REHAB BREAKDOWN LOG:", W/2 - 150, H/2 + 10); 
        ctx.fillStyle = '#fff'; ctx.font = "14px 'Exo 2'"; 
        ctx.fillText(`• Inversion Moves (Left):  ${leftMoves}`, W/2 - 150, H/2 + 45); 
        ctx.fillText(`• Eversion Moves (Right):  ${rightMoves}`, W/2 - 150, H/2 + 75); 
        
        ctx.textAlign = 'center'; 
        ctx.fillStyle = '#a855f7'; ctx.fillRect(W/2 - 200, H/2 + 158, 178, 42); 
        ctx.fillStyle = '#1f2937'; ctx.fillRect(W/2 + 22, H/2 + 158, 178, 42); 
        ctx.fillStyle = '#fff'; ctx.font = "bold 13px 'Orbitron'"; 
        ctx.fillText("RETRY MODE", W/2 - 111, H/2 + 184); 
        ctx.fillText("MAIN MENU", W/2 + 111, H/2 + 184); 
        
        requestAnimationFrame(updateAndRender); 
        return;
      }

      if(laneT < 1.0) { laneT += 0.18; if(laneT > 1.0) laneT = 1.0; } 
      let pX = playerLanesX[prevLane] + (playerLanesX[currentLane] - playerLanesX[prevLane]) * laneT; 

      spawnTimer++;
      if(spawnTimer % spawnInterval === 0) { spawnObstacle(); } 
      if(spawnTimer > 400 && spawnTimer % 300 === 0) { 
        if(spawnInterval > 50) spawnInterval -= 6; 
        gameSpeed += 0.001; 
      }

      for(let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.progress += gameSpeed;

        let currentY = horizonY + (roadBottomY - horizonY) * obs.progress;
        let startX = horizonLanesX[obs.lane];
        let endX = playerLanesX[obs.lane];
        let currentX = startX + (endX - startX) * obs.progress;

        let scaleSize = 8 + (50 * obs.progress); 

        if(!obs.passed && currentY > playerBaseY + 20) {
          obs.passed = true;
          score += 10; 
          document.getElementById('hud-score').textContent = score; 
        }

        if(obs.progress >= 1.05) {
          obstacles.splice(i, 1); 
          continue; 
        }

        ctx.fillStyle = '#ff0055'; 
        ctx.strokeStyle = '#ff99bb'; 
        ctx.lineWidth = 2; 
        ctx.fillRect(currentX - scaleSize/2, currentY - scaleSize, scaleSize, scaleSize); 
        ctx.strokeRect(currentX - scaleSize/2, currentY - scaleSize, scaleSize, scaleSize); 

        if(obs.progress > 0.82 && obs.progress < 0.98) {
          if(obs.lane === currentLane) {
            gameOver = true; 
          }
        }
      }

      ctx.fillStyle = '#00f5d4'; 
      ctx.strokeStyle = '#fff'; 
      ctx.lineWidth = 2; 
      ctx.beginPath();
      ctx.moveTo(pX, playerBaseY - 35);
      ctx.lineTo(pX - 22, playerBaseY + 10);
      ctx.lineTo(pX + 22, playerBaseY + 10);
      ctx.closePath(); ctx.fill(); ctx.stroke();

      ctx.fillStyle = (time % 160 > 80) ? '#ff9f1c' : '#ff3366'; 
      ctx.fillRect(pX - 6, playerBaseY + 11, 12, 6); 

      requestAnimationFrame(updateAndRender); 
    }

    requestAnimationFrame(updateAndRender); 
  </script>
</body>
</html>
