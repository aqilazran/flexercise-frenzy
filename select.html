<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Step — Select Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      /* Smooth animated moving cosmic gradient background */
      background: linear-gradient(125deg, #120633 0%, #1b0947 35%, #2a0e66 70%, #0d0426 100%);
      background-size: 400% 400%;
      animation: movingCosmos 16s ease infinite;
      font-family: 'Exo 2', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Keyframes to make the gradient move fluidly */
    @keyframes movingCosmos {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-family: 'Orbitron', monospace;
      color: white;
      font-size: 32px;
      letter-spacing: 4px;
      margin-bottom: 40px;
      text-shadow: 0 0 15px #a855f7;
    }
    .menu-container {
      display: flex;
      gap: 30px;
      max-width: 1000px;
      width: 90%;
      justify-content: center;
    }
    .card {
      background: rgba(43, 19, 92, 0.6);
      border: 2px solid #6b21a8;
      border-radius: 16px;
      width: 280px;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .card:hover {
      transform: translateY(-8px);
      border-color: #a855f7;
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.5);
      background: rgba(58, 25, 122, 0.8);
    }
    .card h3 {
      font-family: 'Orbitron', monospace;
      color: #00f5d4;
      font-size: 20px;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .card p {
      color: #f0abfc;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 15px;
    }
    /* Kept descriptions clean and forced white color layout safely */
    .card .description-text {
      color: #ffffff !important;
      text-transform: none !important;
      font-weight: 400 !important;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 10px;
      letter-spacing: 0px;
    }
    .icon-box {
      margin: 20px auto;
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-back {
      margin-top: 50px;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.6);
      padding: 10px 24px;
      border-radius: 30px;
