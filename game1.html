<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Future Step — Side Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #09021a;
      font-family: 'Orbitron', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #hud {
      position: absolute;
      top: 18px;
      width: 90%;
      max-width: 820px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
      pointer-events: none;
    }
    .hud-box {
      background: rgba(15, 6, 38, 0.85);
      border: 1px solid rgba(34, 211, 238, 0.4);
      padding: 10px 22px;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      letter-spacing: 2px;
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.15);
    }
    .hud-box span {
      color: #22d3ee;
      font-weight: 900;
    }

    #canvas-container {
      position: relative;
      box-shadow: 0 0 50px rgba(34, 211, 238, 0.25);
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(34, 211, 238, 0.3);
    }

    canvas {
      display: block;
      background: #020617;
    }
  </style>
</head>
<body>

  <div id="hud">
    <div class="hud-box">SCORE: <span id="hud-score">0</span></div>
    <div class="hud-box">HIGH SCORE: <span id="hud-high">0</span></div>
    <div class="hud-box">ANKLE MOVES: <span id="hud-moves">0</span></div>
  </div>

  <div id="canvas-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const W = canvas.width;
    const H = canvas.height;

    // Game states
    let started = false;
    let gameOver = false;
    let score = 0;
    let highScore = localStorage.getItem('sideRunner_high') || 0;
    let moveCount = 0;

    // 3-Lane Perspective Geometry definitions
    const horizonY = 220;
    const playerBaseY = 510;
    
    // X Positions [Left, Center, Right] at horizon vs near player
    const horizonLanesX =;
    const playerLanesX =;

    let currentLane = 1; // Start in middle lane (0=Left, 1=Center, 2=Right)
    let playerX = playerLanesX[currentLane];

    // Obstacles configuration
    let obstacles = [];
    let spawnTimer = 0;
    let gameSpeed = 0.007; 
    let time = 0;

    // Background stars / grid lines animation state
    let gridOffset = 0;

    function resetGame() {
      score = 0;
      moveCount = 0;
      currentLane = 1;
      playerX = playerLanesX[currentLane];
      obstacles = [];
      spawnTimer = 0;
      gameSpeed = 0.008;
      gameOver = false;
      document.getElementById('hud-score').textContent = score;
      document.getElementById('hud-moves').textContent = moveCount;
    }

    function moveLeft() {
      if (gameOver || !started) return;
      if (currentLane > 0) {
        currentLane--;
        moveCount++;
        document.getElementById('hud-moves').textContent = moveCount;
      }
    }

    function moveRight() {
      if (gameOver || !started) return;
      if (currentLane < 2) {
        currentLane++;
        moveCount++;
        document.getElementById('hud-moves').textContent = moveCount;
      }
    }

    // Input listeners
    document.addEventListener('keydown', (e) => {
      if (!started) { started = true; return; }
      if (gameOver) return;
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLeft();
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveRight();
    });

    canvas.addEventListener('click', (e) => {
      if (!started) { started = true; return; }
      
      const rect = canvas.getBoundingClientRect();
      const cx = (e.clientX - rect.left) * (W / rect.width);
      const cy = (e.clientY - rect.top) * (H / rect.height);

      if (gameOver) {
        // Left button: Restart
        if (cx > W/2 - 195 && cx < W/2 - 20 && cy > H/2 + 140 && cy < H/2 + 190) {
          resetGame();
        }
        // Right button: Exit
        if (cx > W/2 + 20 && cx < W/2 + 195 && cy > H/2 + 140 && cy < H/2 + 190) {
          window.location.href = 'select.html';
        }
        return;
      }

      // Tap split-screen controls
      if (cx < W / 2) moveLeft();
      else moveRight();
    });

    document.getElementById('hud-high').textContent = highScore;

    // Main Game Loop
    function update() {
      time++;
      
      if (!started || gameOver) return;

      // Accelerate slightly over time
      gameSpeed += 0.000002;

      // Interpolate player position smoothly for lane change effect
      const targetX = playerLanesX[currentLane];
      playerX += (targetX - playerX) * 0.25;

      // Animate infinite environment ground movement
      gridOffset += (gameSpeed * 450);
      if (gridOffset >= 40) gridOffset = 0;

      // Spawning obstacles
      spawnTimer++;
      let spawnInterval = Math.max(45, 90 - Math.floor(gameSpeed * 4000));
      if (spawnTimer > spawnInterval) {
        spawnTimer = 0;
        let randomLane = Math.floor(Math.random() * 3);
        obstacles.push({
          lane: randomLane,
          progress: 0, // 0 = horizon, 1 = player hit line
          passed: false
        });
      }

      // Update Obstacles progress
      for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.progress += gameSpeed;

        // Scoring condition
        if (!obs.passed && obs.progress >= 0.95) {
          obs.passed = true;
          score += 10;
          document.getElementById('hud-score').textContent = score;
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('sideRunner_high', highScore);
            document.getElementById('hud-high').textContent = highScore;
          }
        }

        // Clean up distant elements
        if (obs.progress >= 1.1) {
          obstacles.splice(i, 1);
          continue;
        }

        // Collision detection calculation
        if (obs.progress > 0.85 && obs.progress < 1.02) {
          if (obs.lane === currentLane) {
            gameOver = true;
          }
        }
      }
    }

    function draw() {
      // Clear screen
      ctx.fillStyle = '#0b0f19';
      ctx.fillRect(0, 0, W, H);

      // Draw Cyber Sky Gradient
      let skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
      skyGrad.addColorStop(0, '#0c0721');
      skyGrad.addColorStop(0.6, '#170b42');
      skyGrad.addColorStop(1, '#251464');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, horizonY);

      // Draw Distant Mountains/City Grid Lights
      ctx.strokeStyle = 'rgba(34, 211, 238, 0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for(let i=0; i<W; i+=40) {
        let h = 20 + Math.sin(i*0.05)*15;
        ctx.moveTo(i, horizonY);
        ctx.lineTo(i, horizonY - h);
      }
      ctx.stroke();

      // Draw Perspective Ground Track lines (3 Lanes)
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#22d3ee';
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#22d3ee';

      // Left Outer Boundary
      ctx.beginPath();
      ctx.moveTo(horizonLanesX - 15, horizonY);
      ctx.lineTo(playerLanesX - 80, H);
      ctx.stroke();

      // Right Outer Boundary
      ctx.beginPath();
      ctx.moveTo(horizonLanesX + 15, horizonY);
      ctx.lineTo(playerLanesX + 80, H);
      ctx.stroke();

      // Lane Separator Lines
      ctx.strokeStyle = 'rgba(34, 211, 238, 0.4)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash();
      
      // Left lane divider
      ctx.beginPath();
      ctx.moveTo((horizonLanesX+horizonLanesX)/2, horizonY);
      ctx.lineTo((playerLanesX+playerLanesX)/2, H);
      ctx.stroke();

      // Right lane divider
      ctx.beginPath();
      ctx.moveTo((horizonLanesX+horizonLanesX)/2, horizonY);
      ctx.lineTo((playerLanesX+playerLanesX)/2, H);
      ctx.stroke();
      
      ctx.setLineDash([]);
      ctx.shadowBlur = 0; // Reset glows

      // Horizontal perspective speed lines
      ctx.strokeStyle = 'rgba(34, 211, 238, 0.12)';
      ctx.lineWidth = 2;
      for (let yOffset = gridOffset; yOffset < (H - horizonY); yOffset += 35) {
        let ratio = yOffset / (H - horizonY);
        let currY = horizonY + yOffset;
        let leftBoundaryX = (horizonLanesX-15) + ((playerLanesX-80) - (horizonLanesX-15)) * ratio;
        let rightBoundaryX = (horizonLanesX+15) + ((playerLanesX+80) - (horizonLanesX+15)) * ratio;
        ctx.beginPath();
        ctx.moveTo(leftBoundaryX, currY);
        ctx.lineTo(rightBoundaryX, currY);
        ctx.stroke();
      }

      // Draw Obstacles in Perspective Scaling
      for (let i = 0; i < obstacles.length; i++) {
        let obs = obstacles[i];
        let p = obs.progress;

        let startX = horizonLanesX[obs.lane];
        let endX = playerLanesX[obs.lane];
        let currentX = startX + (endX - startX) * p;
        let currentY = horizonY + (playerBaseY - horizonY) * p;

        // Size expansion based on perspective progress
        let baseW = 18;
        let baseH = 34;
        let scaleW = baseW + (52 * p);
        let scaleH = baseH + (66 * p);

        // Core obstacle graphic node
        ctx.fillStyle = '#ef4444';
        ctx.strokeStyle = '#fca5a5';
        ctx.lineWidth = 1 + (2 * p);
        
        ctx.shadowBlur = 8 * p;
        ctx.shadowColor = '#ef4444';

        // Barrier container rounded look
        ctx.beginPath();
        ctx.roundRect(currentX - scaleW/2, currentY - scaleH, scaleW, scaleH, 6 * p);
        ctx.fill();
        ctx.stroke();
        
        // Dynamic caution sign inner decal
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(currentX, currentY - scaleH/2, 4 * p, 0, Math.PI*2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
      }

      // Draw Character at bottom lane center position
      let charSizeScale = 1.0;
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#a855f7';

      // Simple running bounce effect
      let bounceY = Math.sin(time * 0.2) * 3;
      let pY = playerBaseY + bounceY;

      // Draw neon runner avatar (Backside view going forward)
      ctx.fillStyle = '#a855f7'; // Purple spacesuit
      ctx.fillRect(playerX - 14, pY - 50, 28, 38);
      
      ctx.fillStyle = '#c084fc'; // Shoulders / jetpack trim
      ctx.fillRect(playerX - 17, pY - 46, 6, 20);
      ctx.fillRect(playerX + 11, pY - 46, 6, 20);

      ctx.fillStyle = '#22d3ee'; // Cyber helmet visor looking forward
      ctx.fillRect(playerX - 9, pY - 64, 18, 12);

      // Running legs visualization
      ctx.fillStyle = '#7c3aed';
      if (Math.sin(time * 0.2) > 0) {
        ctx.fillRect(playerX - 11, pY - 12, 7, 14);
        ctx.fillRect(playerX + 4, pY - 12, 7, 8);
      } else {
        ctx.fillRect(playerX - 11, pY - 12, 7, 8);
        ctx.fillRect(playerX + 4, pY - 12, 7, 14);
      }

      ctx.shadowBlur = 0; // Clear overlay shadows

      // Screen overlay management
      if (!started) {
        ctx.fillStyle = 'rgba(11, 6, 30, 0.85)';
        ctx.fillRect(0, 0, W, H);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = '900 24px "Orbitron"';
        ctx.textAlign = 'center';
        ctx.fillText('SIDE RUNNER: SUBWAY CONCEPT', W / 2, H / 2 - 40);
        
        ctx.fillStyle = '#22d3ee';
        ctx.font = '600 15px "Exo 2"';
        ctx.fillText('Train Inversion / Eversion by dodging barriers', W / 2, H / 2);
        ctx.fillText('PRESS ANY KEY OR TAP SCREEN TO START', W / 2, H / 2 + 50);
      }

      if (gameOver) {
        ctx.fillStyle = 'rgba(15, 2, 2, 0.9)';
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = '#ef4444';
        ctx.font = '900 36px "Orbitron"';
        ctx.textAlign = 'center';
        ctx.fillText('SESSION COMPLETE', W / 2, H / 2 - 50);

        ctx.fillStyle = '#ffffff';
        ctx.font = '600 16px "Exo 2"';
        ctx.fillText(`Final Score: ${score} points`, W / 2, H / 2 + 5);
        ctx.fillText(`Ankle Adjustments: ${moveCount} executions`, W / 2, H / 2 + 30);

        // Interactive Button Layout
        // Left Button: Retry
        ctx.fillStyle = '#1e293b';
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(W/2 - 195, H/2 + 140, 175, 50, 25);
        ctx.fill();
        ctx.stroke();

        // Right Button: Menu
        ctx.fillStyle = '#1e293b';
        ctx.strokeStyle = '#ffffff';
        ctx.beginPath();
        ctx.roundRect(W/2 + 20, H/2 + 140, 175, 50, 25);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#ef4444';
        ctx.font = '900 13px "Orbitron"';
        ctx.fillText('RETRY MODE', W/2 - 107, H/2 + 171);

        ctx.fillStyle = '#ffffff';
        ctx.fillText('ALL GAMES', W/2 + 107, H/2 + 171);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
